# Mifdlal — custom character for the mifdlaldev profile.
# Glyph language: '#' solid · '+' dense fluff · '-' light fluff · '@' eye · ' ' empty.
# Face variants (blinks, glances, happy eyes, open mouth) are derived by the
# engine from the eye/mouth rows — art stays as small as possible.
#
# Palette is custom (body #5A8493) so this is not a 1:1 copy of the reference
# Awan. Same cloud shape, own colours.

spec_version = 1

[character]
name = "Mifdlal"
author = "mifdlaldev"
description = "A small teal cloud buddy — building agents from Bandung."

[character.palette]
body = "#5A8493"       # teal slate (90,132,147)
eye = "#1B2A30"        # near-black teal (27,42,48)
eye_white = "#EAF2F4"  # soft cloud white (234,242,244)
charred = "#3A4F57"    # scorched teal-grey (58,79,87)

[sprite]
rows = [
    " -+####+- ",
    "+########+",
    "##@@##@@##",
    "##########",
    "+########+",
    " ## ## ## ",
]
sit_rows = [
    "          ",
    " -+####+- ",
    "+########+",
    "##@@##@@##",
    "##########",
    "+########+",
]
leg_frames = [
    " ## ## ## ",
    "## ## ##  ",
    " ## ## ## ",
    "  ## ## ##",
]
shimmer_row = "-+######+-" # idle fluff shimmer on the top row
eye_row = 2
mouth_row = 3
legs_row = 5

[personality]
blink_rate = 1.0
walk_speed = 1.0
chaos = 0.1

[reactions]
"cmd.failed" = "charred"
"task.done" = "celebrate"
"idle" = "sleep"
